name: Sync CRM — Tiny → Supabase

on:
  schedule:
    # Todo dia às 23h (horário de Brasília = 02:00 UTC do dia seguinte)
    - cron: '0 2 * * *'
  # Permite disparar manualmente pela API ou pelo botão no Hub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run sync CRM
        env:
          TINY_TOKEN: ${{ secrets.TINY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NODE_PATH: backend/node_modules
        run: node run-sync-crm.js
